<!DOCTYPE html>
<html>
<head>
    <title>Config Test</title>
    <script src='config.js'></script>
</head>
<body>
    <h1>Configuration Test</h1>
    <div id="output"></div>
    <script>
        const output = document.getElementById('output');
        let html = '<h2>Configuration Status:</h2>';
        
        // Check if config variables are defined
        html += '<p><strong>IBM_TTS_API_KEY:</strong> ' + (typeof IBM_TTS_API_KEY !== 'undefined' ? '✓ Defined' : '✗ Not defined') + '</p>';
        html += '<p><strong>IBM_TTS_URL:</strong> ' + (typeof IBM_TTS_URL !== 'undefined' ? '✓ Defined' : '✗ Not defined') + '</p>';
        html += '<p><strong>IBM_NLU_CONFIG:</strong> ' + (typeof IBM_NLU_CONFIG !== 'undefined' ? '✓ Defined' : '✗ Not defined') + '</p>';
        html += '<p><strong>CLOUDANT_URL:</strong> ' + (typeof CLOUDANT_URL !== 'undefined' ? '✓ Defined' : '✗ Not defined') + '</p>';
        html += '<p><strong>CLOUDANT_API_KEY:</strong> ' + (typeof CLOUDANT_API_KEY !== 'undefined' ? '✓ Defined' : '✗ Not defined') + '</p>';
        
        // Check if they have real values (not placeholders)
        html += '<h2>Configuration Values:</h2>';
        if (typeof IBM_NLU_CONFIG !== 'undefined') {
            html += '<p><strong>NLU API Key:</strong> ' + (IBM_NLU_CONFIG.apiKey !== 'YOUR_IBM_WATSON_NLU_API_KEY_HERE' ? '✓ Configured' : '✗ Using placeholder') + '</p>';
            html += '<p><strong>NLU URL:</strong> ' + (IBM_NLU_CONFIG.url !== 'YOUR_IBM_WATSON_NLU_URL_HERE' ? '✓ Configured' : '✗ Using placeholder') + '</p>';
        }
        
        if (typeof CLOUDANT_URL !== 'undefined') {
            html += '<p><strong>Cloudant URL:</strong> ' + (CLOUDANT_URL !== 'YOUR_CLOUDANT_URL_HERE' ? '✓ Configured' : '✗ Using placeholder') + '</p>';
        }
        
        output.innerHTML = html;
    </script>
</body>
</html>
