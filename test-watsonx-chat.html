<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test watsonx Chat</title>
    <script src='config.js'></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        #root {
            margin-top: 20px;
            min-height: 400px;
            border: 2px dashed #ccc;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>🔍 watsonx Orchestrate Chat Diagnostics</h1>
    <div id="diagnostics"></div>
    <div id="root"></div>

    <script>
        const diagnostics = document.getElementById('diagnostics');
        
        function addStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            diagnostics.appendChild(div);
        }

        // Check 1: Config file loaded
        if (typeof WATSONX_ORCHESTRATE_CONFIG === 'undefined') {
            addStatus('❌ ERROR: config.js not loaded or WATSONX_ORCHESTRATE_CONFIG not defined', 'error');
        } else {
            addStatus('✅ config.js loaded successfully', 'success');
            
            // Check 2: Config values
            const config = WATSONX_ORCHESTRATE_CONFIG;
            addStatus(`📋 Orchestration ID: ${config.orchestrationID}`, 'info');
            addStatus(`🌐 Host URL: ${config.hostURL}`, 'info');
            addStatus(`🤖 Agent ID: ${config.agentId}`, 'info');
            addStatus(`📦 Root Element: ${config.rootElementID}`, 'info');
            
            // Check 3: Root element exists
            const rootElement = document.getElementById(config.rootElementID);
            if (!rootElement) {
                addStatus(`❌ ERROR: Root element #${config.rootElementID} not found in DOM`, 'error');
            } else {
                addStatus(`✅ Root element #${config.rootElementID} found`, 'success');
            }
            
            // Check 4: Initialize watsonx
            addStatus('🔄 Initializing watsonx Orchestrate chat...', 'info');
            
            window.wxOConfiguration = {
                orchestrationID: config.orchestrationID,
                hostURL: config.hostURL,
                rootElementID: config.rootElementID,
                deploymentPlatform: config.deploymentPlatform,
                crn: config.crn,
                chatOptions: {
                    agentId: config.agentId,
                }
            };
            
            // Load the watsonx chat widget
            setTimeout(function () {
                const script = document.createElement('script');
                const scriptUrl = `${window.wxOConfiguration.hostURL}/wxochat/wxoLoader.js?embed=true`;
                
                addStatus(`📥 Loading script from: ${scriptUrl}`, 'info');
                script.src = scriptUrl;
                
                script.addEventListener('load', function () {
                    addStatus('✅ Script loaded successfully', 'success');
                    try {
                        if (typeof wxoLoader !== 'undefined') {
                            wxoLoader.init();
                            addStatus('✅ wxoLoader.init() called successfully', 'success');
                        } else {
                            addStatus('❌ ERROR: wxoLoader is undefined after script load', 'error');
                        }
                    } catch (error) {
                        addStatus(`❌ ERROR initializing wxoLoader: ${error.message}`, 'error');
                    }
                });
                
                script.addEventListener('error', function () {
                    addStatus('❌ ERROR: Failed to load wxoLoader.js script', 'error');
                    addStatus('Possible causes: Network issue, incorrect URL, CORS policy, or invalid credentials', 'error');
                });
                
                document.head.appendChild(script);
            }, 100);
        }
        
        // Monitor console errors
        window.addEventListener('error', function(e) {
            addStatus(`❌ JavaScript Error: ${e.message}`, 'error');
        });
    </script>
</body>
</html>
